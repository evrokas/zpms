structure:
  header:
    - header
    - header-grid-2x1:
      - left-column:
        - userblock
      - right-column:
        - githash
        - language_selector
    - location
    - breadcrumbs
  main_navigation:
    - mainnavigation
  notification:
    - notifications
    - message
  main_content:
    - content
  footer:
    - footer
    - copyright

menu:
  main:
    - homepage:
      text: 
        gr: 'Αρχική'
        en: 'Home'
      url: '/'
      # path: home
    - patients:
      text: 
        gr: 'Ασθενείς'
        en: 'Patients'
      access: power-user
      # url: '/patients'
      submenu:
        - patients_list:
          text: 
            gr: 'Λίστα'
            en: 'List'
          url: '/patients'
        - patient_new:
          text: 
            gr: 'Νεός'
            en: 'New'
          url: /patient/new
      # path: '/patients'
    - operations:
      text:
        gr: 'Χειρουργεία'
        en: 'Operations'
      access: power-user
      # url: '/operations'
      submenu:
        - operations_list:
          text: 
            gr: 'Λίστα'
            en: 'List'
          url: '/operations'
        - patient_new:
          text: 
            gr: 'Νέο'
            en: 'New'
          url: /operation/new
      # path: '/patients'
      # disabled: true
    - appointments:
      text:
        gr: 'Ραντεβού'
        en: 'Appointments'
      url: '/appointments'
      disabled: true
    - applications:
      text:
        en: 'Apps'
        gr: 'Εφαρμογές'
      submenu:
        - settings:
          text:
            gr: "Ρυθμίσεις"
            en: "Settings"
          url: '/settings'
          access: power-user
        - contact:
          text:
            gr: 'Επικοινωνία'
            en: 'Contact'
          url: '#'
        - qrgenerator:
          text:
            gr: 'Δημιουργία κωδικού QR'
            en: 'Generate QR code'
          url: /apps/genqr
        - pdflib-module:
          text:
            gr: 'Καταχωρητήριο PDF'
            en: 'PDF Archive'
          url: /apps/pdflib
          access: power-user
        - finance-module:
          text:
            gr: 'Οικονομικά Στοιχεία'
            en: 'Finanace'
          url: /apps/finance

# Module site configuration
#
# modfconf:
#   module_name:
#     hide: (hide module from these routes)
#     display: (display module in these routes)
#       route_name:
#         arguments: (arguments to pass by default)
#           - arg1: value1
#         access: [access_roles, to allow for route]
modconf:
  message:
    display:
      userprofile:
          arguments:
            type: "Announcements"
          access: authenticated
      

modules:
  path:
    - "/web/core/modules/"
    - "/web/modules/"
  modules:
    - admin
    - mainnavigation
    - notifications
    - header
    - breadcrumbs
    - userblock
    - userprofile
    - htmltext
    - githash
    - copyright
    - content
    - location
    - datepicker
    - pdflib
    - language_selector
    - message
    - finance
