title: Patient Management System

tz: "Europe/Athens"

meta:
  - charset="UTF-8"
  - http-equiv="X-UA-Compatible" content="IE=edge"
  - name="viewport" content="width=device-width, initial-scale=1.0"

favicon: 'assets/favicon.ico'

templates:
  - './core/templates/'
  - './templates/'
css:
  - normalize:
    src: 'css/normalize.css'
  - navigation:
    src: 'css/navigation.css'
  - styles:
    src: 'css/styles.css'
  - boxicons:
    src: 'css/bx/css/boxicons.min.css'
  # - breadcrumbs:
    # src: 'css/breadcrumbs.css'
  # - utils:
    # src: 'css/loader.css'
  # - pikaday:
    # src: "https://cdn.jsdelivr.net/npm/pikaday/css/pikaday.css"


# setup multiple language support
multilingual: true

languages:
  - en
  - gr

# use libraries concept to attach different css/js to different pages
libraries:
  loader-library:
    css:
      - loader:
        src: 'css/loader.css'
    foot_script:
      - loader:
        # type:
        src: 'js/loader.js'
    # - head_script:
  # location-places:
    # css:
    #   - location:
    #     src: 'css/location.css'
    # foot_script:
    #   - location:
    #     type:
    #     src: 'js/location.js'
  # breadcrumbs-library:
    # css:
      # - breadcrumbs:
        # src: 'css/breadcrumbs.css'
  qrgenerator-library:
    css:
      - qrgen:
        src: 'css/qrgenerator.css'
  textarea-autoexpand-library:
    foot_script:
      - textarea-autoexpand:
        defer:
        src: 'js/textarea-autoexapand.js'



# head_script:
foot_script:
  - scripts:
    type: 
    src: "js/scripts.js"
  # - loader:
    # type:
    # src: "js/loader.js"
  # - pikaday:
    # type: 
    # src: "https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"
  # - moment:
    # type:  
    # src: "https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"
  
roles:
  anonymous: anonymous
  administrator: all
  authenticated: authenticated_content
  user: [patients-view-list, appointments-view-list]
  power-user: [
    patients-view-list,
    patients-new-patient,
    patients-delete-patient, 
    patients-edit-patient, 
    appointment-edit,
    pdflib-access
    ]


# reduce analytics entries, by not logging localhost calls
analytics:
  ignore_ips: [127.0.0.1]

routes:
  homepage:
    title: "Homepage"
    name: homepage
    url: "/"
    handler: homepage
#  admin:
#    title: "Administration"
#    name : admin
#    url: "/admin"
#    handler: admin
#    access: administrator
  login:
    title: "User login"
    url: "/login"
    handler: login
    method: get
  login_post:
    title: "User login"
    url: "/login"
    handler: login_post
    method: post
  logout:
    title: "User logout"
    url: "/logout"
    handler: logout
  settings:
    title: "Settings"
    url: "/settings"
    handler: settings
  patients:
    title: "Patients"
    url: [
          "/patients",
          "/patients/sort/{key}",
          "/patients/sort/{key}/{order}"
          ]
    handler: patients_list
    access: authenticated user
  patients_search:
    title: "Patients"
    url: "/patients/search/{term}"
    handler: patients_list_search
    access: authenticated user
  # patients_search0:
    # title: "Patients"
    # url: "/patients/search"
    # handler: patients_list
    # access: authenticated user
  patients_search_ajax:
    title: "Patients"
    url: "/patients/searchajax/{term}"
    handler: patients_list_search_ajax
    access: authenticated user
  patients_search_post:
    title: "Patients search"
    url: "/patients/search"
    handler: patients_search_post
    method: post
  patient_edit:
    title: "Patient edit"
    url: "/patient/{id}/edit"
    handler: patient_edit
    method: get
  patient_edit_post:
    title: "Patient edit"
    url: "/patient/{id}/edit"
    handler: patient_edit_post
    method: post
  patient_new:
    title: "New Patient"
    url: /patient/new
    handler: patient_new
    method: get
  patient_new_post:
    title: "New Patient"
    url: /patient/new
    handler: patient_new_post
    method: post
  patient_delete:
    title: "Patient delete"
    url: "/patient/{id}/delete"
    handler: patient_delete
  appointments:
    title: "Appointments"
    url: /appointments
    handler: appointments_list
    access: authenticated user
  appointment_edit:
    title: "Appointment edit"
    url: "/appointment/{id}/edit"
    handler: appointment_edit
    method: get
  appointment_edit_post:
    title: "Appointment edit"
    url: "/appointment/{id}/edit"
    handler: appointment_edit_post
    method: post
  appointment_new:
    title: "New appointment"
    url: "/appointment/new"
    handler: appointment_new
    method: get
  appointment_new_post:
    title: "New appointment"
    url: "/appointment/new"
    handler: appointment_new_post
    method: post
  appointment_delete:
    title: "Appointment delete"
    url: "/appointment/{id}/delete"
    handler: appointment_delete
  appointment_recover:
    title: "Appointment recover"
    url: "/appointment/{id}/recover"
    handler: appointment_recover
  patient_appointment_new:
    title: "New patient appointment"
    url: "/appointment/{id}/newappointment"
    handler: patient_appointment_new
    method: get
  patient_appointment_new_post:
    title: "New patient appointment"
    url: "/appointment/{id}/newappointment"
    handler: patient_appointment_new_post
    method: post
  qrgenerator:
    title: "Generate QR code"
    url: "/apps/genqr"
    handler: app_generate_qr
    method: get
  qrgenerator_post:
    title: "Generate QR code"
    url: "/apps/genqr"
    handler: app_generate_qr
    method: post

