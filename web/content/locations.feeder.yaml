title: location feeder
schema: locations.yaml
schemadir: '@app/web/classes/yaml'
content_dir: '/web/content'
# can read folder for .yml files
source:
  - locations

key: 
 name: lang
 value: [en, gr]

guid:
  - guid
  
date:
  - cdate

name:
  - machinename
  - name

prefeed:
