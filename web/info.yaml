css:
  - 'css/styles.css'
  - 'css/boxicons.min.css'
  - 'css/breadcrumbs.css'

title: This is a test website

routes:
  homepage:
    title: "Homepage"
    name: homepage
    url: "/"
    handler: homepage
  admin:
    title: "Administration"
    name : admin
    url: "/admin"
    handler: admin
  info:
    title: Information
    name: info
    url: "/info/due"
    handler: info_due
  info3:
    title: Information3
    name: info3
    url: "/info/data/{name}/edit"
    handler: info_data_id_edit
  info2:
    title: Information2
    name: info
    url: "/info/data/{id}/{no}"
    handler: info_data_id_no
  error404:
    title: Page Not Found
    name: error404
    url: "/404"
    handler: error_404
  

regions:
  - header
  - main_navigation
  - main_content
  - footer

blocks:
  - header: header
  - breacrumbs: header
  - mainnavigation: main_navigation
  - maincontent: main_content
  - footer: footer


structure:
  header:
    - header
    - breadcrumbs
  main_navigation:
    - mainnavigation
  main_content:
    - maincontent
  footer:
    - footer


