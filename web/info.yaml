meta:
  - charset="UTF-8"
  - http-equiv="X-UA-Compatible" content="IE=edge"
  - name="viewport" content="width=device-width, initial-scale=1.0"

title: Patient Management System

css:
  - styles:
    src: 'css/styles.css'
  - boxicons:
    src: 'css/boxicons.min.css'
  - breacrumbs:
    src: 'css/breadcrumbs.css'

head_script:
  - ionicons_module:
    type: "module"
    src: "https://unpkg.com/ionicons@latest/dist/ionicons/ionicons.esm.js"
  - ionicons_nomodule:
    type: "nomodule"
    src: "https://unpkg.com/ionicons@latest/dist/ionicons/ionicons.js"


routes:
  homepage:
    title: "Homepage"
    name: homepage
    url: "/"
    handler: homepage
  admin:
    title: "Administration"
    name : admin
    url: "/admin"
    handler: admin
    permissions: authenticated
  patients:
    title: "Patients"  
    url: "/patients"
    handler: patients_list
  patient_edit:
    title: "Patient edit"
    url: "/patient/{id}/edit"
    handler: patient_edit
    method: get
  patient_edit_post:
    title: "Patient edit"
    url: "/patient/{id}/edit"
    handler: patient_edit_post
    method: post
  patient_delete:
    title: "Patient delete"
    url: "/patient/{id}/delete"
    handler: patient_delete
  appointments:
    title: "Appointments"
    url: /appointments
    handler: appointments_list

regions:
  - header
  - main_navigation
  - notification
  - main_content
  - footer

blocks:
  - header: header
  - breacrumbs: header
  - mainnavigation: main_navigation
  - maincontent: main_content
  - footer: footer

structure:
  header:
    - header
    - breadcrumbs
  main_navigation:
    - mainnavigation
  notification:
    - notifications
  main_content:
    - content
  footer:
    - footer
    - copyright

menu:
  main:
    - home:
      text: 'Home'
      url: '/'
      path: home
    - patients:
      text: 'Patient List'
      url: '/patients'
      path: home/patients
    - appointments:
      text: 'Appointment List'
      url: '/appointments'
    - contact:
      text: 'Contact'
      url: '#'
