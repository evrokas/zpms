table: 
  name: procedure_info
  class: procedureInfoClass
  fields:
    - name: "guid"
      type: "@guid"

    - name: "cdate"
      type: "@cdate"

    - name: "cuser"
      type: "@cuser"

    - name: "field_name"
      type: varchar(128)

    - name: "field_category"
      type: char(32)

    - name: "deleted"
      type: datetime
      db_default: null



# procedure_info holds information about
# operation diagnosis
# operation procedure
# clinic
# category
# this 'kind' of information is stored in the field 'field_category'
