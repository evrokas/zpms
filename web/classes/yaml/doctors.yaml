---
table:
  name: doctors
  class: doctorsClass

  fields:
  - name: guid
    type: '@guid'

  - name: cdate
    type: '@cdate'

  - name: cuser
    type: '@cuser'

  - name: doctor_name
    type: varchar(64)

  - name: doctor_specialty
    type: varchar(64)

  - name: deleted
    type: datetime
    default: null

form:
  name: doctors
  method: "post"
  action: "#"
  inputs:
    - name: doc_name
      label: "Doctor name"
      type: text
    
    - name: doc_specialty
      label: "Doctor specialty"
      type: text
  
  buttons:
    - type: "submit"
      label: "Submit"

    - type: "reset"
      label: "Reset"

    - type: "button"
      label: "Cancel"
      action: "window.location.href='index.php';"
...
