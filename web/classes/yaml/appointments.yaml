---
table:
  name: appointments
  class: appointmentsClass
  fields:
  - name: guid
    type: '@guid'
  - name: cdate
    type: '@cdate'
  - name: cuser
    type: '@cuser'
  - name: pguid
    type: '@guid'
  - name: adate
    type: datetime
    default: current_timestamp
  - name: aplace
    type: text
  - name: anote
    type: text
  - name: deleted
    type: datetime
    default: null
...

# - guid appointment guid
# - cdate appointment creation date
# - cuser appointment creation user
# - pguid patient guid
# - adata appointment date/time
# - aplace appointment place
# - anote appointment notes
