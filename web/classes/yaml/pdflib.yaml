table:
  name: pdflib_files
  class: pdflibFilesClass
  fields:
    - name: "guid"
      type: "@guid"

    - name: "cdate"
      type: "@cdate"

    - name: "cuser"
      type: "@cuser"

    - name: "file_name"
      type: VARCHAR(255)

    - name: "file_path"
      type: TEXT

    - name: "file_hash"
      type: char(64)
      db_required: true

    - name: "data"
      type: TEXT

