table:
  name: patients
  class: patientsClass
  fields:
    - name: "guid"
      type: "@guid"

    - name: "cdate"
      type: "@cdate"

    - name: "cuser"
      type: "@cuser"

    - name: "pname"
      type: varchar(64)
      reuired: true

    - name: "pdob"
      type: datetime

    - name: "pamka"
      type: char(11)

    - name: "ptel"
      type: varchar(32)

    - name: "paddr"
      type: varchar(256)

    - name: "pemail"
      type: varchar(128)

    - name: "firstapp"
      type: datetime

    - name: "pnote"
      type: text

    - name: "deleted"
      type: datetime
      db_default: null

  
