table:
  name: operations
  class: operationsClass

  method: "post"
  action: "submit.php"

  fields:
    - name: "guid"
      type: "@guid"

    - name: "cdate"
      type: "@cdate"

    - name: "cuser"
      type: "@cuser"

    - name: "opdate"
      type: datetime
      db_default: current_timestamp

    - name: "pguid"
      type: "@guid"

    - name: "pname"
      type: varchar(64)
      db_required: true

    - name: "pdob"
      type: datetime

    - name: "opdiagnosis"
      type: text

    - name: "opprocedure"
      type: text

    - name: "clinic"
      type: text

      form_type: "select"
      label: "Κλινική"
      options:
       - "Ιατρικό Περιστερίου"
       - "Metropolitan"
       - "Euroclinic"
       - "Βιοκλινική Αθηνών"
      form_default: "Ιατρικό Περιστερίου"

    - name: "category"
      type: text

    - name: "surgeon1"
      type: varchar(64)

    - name: "surgeon2"
      type: varchar(64)

    - name: "anesthesiology"
      type: varchar(64)
    