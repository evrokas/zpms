---
table:
  name: operations
  class: operationsClass

  fields:
    - name: guid
      type: '@guid'

    - name: cdate
      type: '@cdate'

    - name: cuser
      type: '@cuser'

    - name: opdate
      type: datetime
      default: current_timestamp

    - name: pguid
      type: '@guid'

    - name: pname
      type: varchar(64)
      required: true

    - name: pdob
      type: datetime

    - name: opdiagnosis
      type: text

    - name: opprocedure
      type: text

    - name: clinic
      type: text

    - name: category
      type: text

    - name: surgeon1
      type: varchar(64)

    - name: surgeon2
      type: varchar(64)

    - name: anesthesiology
      type: varchar(64)

    - name: invoice_status
      type: text

form:
  name: operations
  method: "post"
  action: "#"
  inputs:
    - name: opdate
      label: "Operation date"
      type: date

    - name: cuser
      label: "user_created"
      type: hidden

    - name: cdate
      label: "date_created"
      type: hidden

    - name: pguid
      label: "Patient GUID"
      type: text

    - name: pname
      label: "Name"
      type: text
      required: true

    - name: pdob
      label: "Date of birth"
      type: datetime

    - name: opdiagnosis
      label: "Diagnosis"
      type: text

    - name: opprocedure
      label: "Procedure"
      type: text

    - name: clinic
      label: "Clinic"
      type: select
      static_options:
        params:
          tableclass: suppliersClass
          label: [name]
          value: guid

    - name: category
      label: "Procedure category"
      type: text

    - name: surgeon1
      label: "Main surgeon"
      type: select
      static_options: 
        params:
          tableclass: doctorsClass
          label: [doctor_name]
          value: guid
          filter:
            doctor_specialty: "Neurosurgery"

    - name: surgeon2
      label: "Assistant surgeon"
      type: select
      static_options: 
        params:
          tableclass: doctorsClass
          label: [doctor_name]
          value: guid
          filter:
            not:
              - doctor_specialty: "Anesthesiology"

    - name: anesthesiology
      label: "Anesthesiologist"
      type: select
      static_options: 
        params:
          tableclass: doctorsClass
          label: [doctor_name]
          value: guid
          filter:
            doctor_specialty: "Anesthesiology"

    - name: invoice_status
      label: "Invoice status"
      type: select
      options:
        pending_issue: "Αναμονή για τιμολόγηση"
        issued_clinic: "Απόδειξη στην κλινική"
        issued_patient: "Απόδειξη στην ασθενή"
        pending_payment: "Αναμονή πληρωμής"
        payed: "Εξόφληση"

